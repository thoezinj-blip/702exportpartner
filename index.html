<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>702 수출 파트너 등록</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Malgun Gothic',sans-serif;background:#F4F6FA;color:#1A1A2E;min-height:100vh}
.header{background:#1A2340;padding:16px 20px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100}
.logo{width:36px;height:36px;background:#C0792B;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;flex-shrink:0}
.header-title{color:#fff;font-size:15px;font-weight:600}
.header-sub{color:#AABBD4;font-size:12px;margin-top:2px}
.container{max-width:560px;margin:0 auto;padding:24px 16px 48px}
.steps{display:flex;gap:6px;margin-bottom:24px}
.step{flex:1;height:4px;border-radius:2px;background:#D8DCE6}
.step.done{background:#1A2340}
.step.cur{background:#C0792B}
.page{display:none}
.page.active{display:block}
.card{background:#fff;border-radius:12px;padding:20px;box-shadow:0 1px 4px rgba(0,0,0,.07);margin-bottom:14px}
.card-title{font-size:15px;font-weight:600;color:#1A2340;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.card-title svg{width:18px;height:18px;color:#6B7A99;flex-shrink:0}
.field{margin-bottom:14px}
.field label{display:block;font-size:13px;color:#6B7A99;margin-bottom:6px;font-weight:500}
.field input,.field select{width:100%;height:42px;border:1px solid #D8DCE6;border-radius:8px;padding:0 12px;font-size:14px;color:#1A1A2E;background:#fff;outline:none;transition:border .15s}
.field input:focus,.field select:focus{border-color:#1A2340}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.add-row{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}
.add-row select{flex:1;min-width:100px;height:38px;border:1px solid #D8DCE6;border-radius:8px;padding:0 10px;font-size:13px;color:#1A1A2E;background:#fff;outline:none}
.add-row select:focus{border-color:#1A2340}
.add-btn{height:38px;padding:0 14px;background:#1A2340;color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;white-space:nowrap;flex-shrink:0}
.add-btn:hover{background:#253358}
.tag-wrap{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px;min-height:38px;padding:8px;background:#F4F6FA;border-radius:8px;border:1px solid #E8ECF4}
.tag{display:inline-flex;align-items:center;gap:5px;font-size:12px;padding:4px 10px;border-radius:20px;font-weight:500}
.car-tag{background:#EBF3FB;color:#185FA5;border:1px solid #B5D4F4}
.cty-tag{background:#EAF3DE;color:#3B6D11;border:1px solid #C0DD97}
.del{cursor:pointer;font-size:15px;opacity:.6;line-height:1;background:none;border:none;color:inherit;padding:0}
.del:hover{opacity:1}
.empty-msg{font-size:12px;color:#A0AABB;padding:4px 2px}
.btn-main{width:100%;height:46px;background:#1A2340;color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;margin-top:4px;transition:background .15s}
.btn-main:hover{background:#253358}
.btn-main:disabled{opacity:.4;cursor:not-allowed}
.btn-back{background:none;border:1px solid #D8DCE6;border-radius:8px;padding:8px 16px;font-size:13px;color:#6B7A99;cursor:pointer;margin-bottom:16px}
.btn-back:hover{background:#F4F6FA}
.sbar{display:flex;align-items:center;gap:8px;padding:10px 14px;border-radius:8px;font-size:13px;margin-top:12px}
.sbar.ok{background:#EAF3DE;color:#3B6D11;border:1px solid #C0DD97}
.sbar.err{background:#FCEBEB;color:#A32D2D;border:1px solid #F7C1C1}
.sbar.ing{background:#F4F6FA;color:#5A6A7E;border:1px solid #D8DCE6}
.info-row{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid #F0F2F6;font-size:14px}
.info-row:last-child{border-bottom:none}
.info-lbl{color:#6B7A99}
.info-val{font-weight:600;color:#1A2340;text-align:right;max-width:60%}
.chip{display:inline-flex;align-items:center;gap:4px;font-size:12px;padding:3px 10px;border-radius:16px;margin:2px;background:#F0F2F6;color:#5A6A7E;border:1px solid #E0E4EE}
.success-wrap{text-align:center;padding:32px 20px}
.ok-circle{width:72px;height:72px;border-radius:50%;background:#EAF3DE;display:flex;align-items:center;justify-content:center;margin:0 auto 20px;font-size:32px}
.ok-circle svg{width:36px;height:36px;color:#3B6D11}
.ok-title{font-size:20px;font-weight:700;color:#1A2340;margin-bottom:8px}
.ok-desc{font-size:14px;color:#6B7A99;line-height:1.7;margin-bottom:20px}
.summary-box{background:#F4F6FA;border-radius:10px;padding:14px 16px;margin-bottom:20px;text-align:left;font-size:13px}
.btn-reset{background:none;border:1px solid #D8DCE6;border-radius:8px;padding:10px 20px;font-size:13px;color:#6B7A99;cursor:pointer}
.btn-reset:hover{background:#F4F6FA}
.hint{font-size:12px;color:#A0AABB;margin-top:8px}
@media(max-width:400px){.field-row{grid-template-columns:1fr}.add-row{flex-direction:column}.add-btn{width:100%}}
</style>
</head>
<body>

<div class="header">
  <div class="logo">702</div>
  <div>
    <div class="header-title">코오롱모빌리티그룹</div>
    <div class="header-sub">수출 파트너 등록 시스템</div>
  </div>
</div>

<div class="container">
  <div class="steps">
    <div class="step cur" id="s1"></div>
    <div class="step" id="s2"></div>
    <div class="step" id="s3"></div>
  </div>

  <!-- PAGE 1 -->
  <div class="page active" id="page1">
    <div class="card">
      <div class="card-title">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        업체 인증
      </div>
      <div class="field">
        <label>업체명</label>
        <input type="text" id="compName" placeholder="예: 글로벌무역(주)">
      </div>
      <div class="field-row">
        <div class="field">
          <label>사업자등록번호</label>
          <input type="text" id="bizNo" placeholder="000-00-00000" maxlength="12">
        </div>
        <div class="field">
          <label>담당자 연락처</label>
          <input type="text" id="phone" placeholder="010-0000-0000" maxlength="13">
        </div>
      </div>
      <div class="field">
        <label>담당자명</label>
        <input type="text" id="contactName" placeholder="홍길동">
      </div>
      <div id="authStatus"></div>
      <button class="btn-main" onclick="doAuth()">인증 및 다음 단계 →</button>
    </div>
  </div>

  <!-- PAGE 2 -->
  <div class="page" id="page2">
    <button class="btn-back" onclick="goPage(1)">← 이전</button>
    <div class="card">
      <div class="card-title">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="1" y="3" width="15" height="13"/><polygon points="16 8 20 8 23 11 23 16 16 16 16 8"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg>
        관심 차종 등록
      </div>
      <p style="font-size:13px;color:#6B7A99;margin-bottom:12px">알림받을 차종을 추가하세요. 복수 선택 가능합니다.</p>
      <div class="add-row">
        <select id="brandSel" onchange="loadModels()"><option value="">제조사</option></select>
        <select id="modelSel"><option value="">모델</option></select>
        <select id="yearSel" style="max-width:100px"><option value="">연식</option></select>
        <button class="add-btn" onclick="addCar()">+ 추가</button>
      </div>
      <div class="tag-wrap" id="carTags"><span class="empty-msg">추가된 차종 없음</span></div>
    </div>
    <div class="card">
      <div class="card-title">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
        수출 국가 등록
      </div>
      <p style="font-size:13px;color:#6B7A99;margin-bottom:12px">수출 대상 국가를 추가하세요. 복수 선택 가능합니다.</p>
      <div class="add-row">
        <select id="contSel" onchange="loadCtrs()">
          <option value="">대륙</option>
          <option>아시아</option><option>중동</option><option>유럽</option>
          <option>아프리카</option><option>북아메리카</option><option>남아메리카</option><option>오세아니아</option>
        </select>
        <select id="ctrSel"><option value="">국가</option></select>
        <button class="add-btn" onclick="addCtr()">+ 추가</button>
      </div>
      <div class="tag-wrap" id="ctrTags"><span class="empty-msg">추가된 국가 없음</span></div>
    </div>
    <button class="btn-main" onclick="goConfirm()">확인 및 다음 →</button>
  </div>

  <!-- PAGE 3 -->
  <div class="page" id="page3">
    <button class="btn-back" onclick="goPage(2)">← 이전</button>
    <div class="card">
      <div class="card-title">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
        등록 내용 확인
      </div>
      <div class="info-row"><span class="info-lbl">업체명</span><span class="info-val" id="c_name"></span></div>
      <div class="info-row"><span class="info-lbl">사업자번호</span><span class="info-val" id="c_biz"></span></div>
      <div class="info-row"><span class="info-lbl">담당자</span><span class="info-val" id="c_contact"></span></div>
      <div class="info-row"><span class="info-lbl">연락처</span><span class="info-val" id="c_phone"></span></div>
      <div style="margin-top:16px">
        <p style="font-size:13px;color:#6B7A99;margin-bottom:8px;font-weight:500">관심 차종</p>
        <div id="c_cars"></div>
      </div>
      <div style="margin-top:14px">
        <p style="font-size:13px;color:#6B7A99;margin-bottom:8px;font-weight:500">수출 국가</p>
        <div id="c_ctrs"></div>
      </div>
      <div id="saveStatus"></div>
      <button class="btn-main" id="saveBtn" onclick="doSave()" style="margin-top:16px">등록 완료</button>
    </div>
  </div>

  <!-- PAGE 4 -->
  <div class="page" id="page4">
    <div class="card">
      <div class="success-wrap">
        <div class="ok-circle">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
        </div>
        <div class="ok-title">등록이 완료되었습니다</div>
        <p class="ok-desc">관심 차종 입고 시 카톡 알림을 발송해 드립니다.<br>변경이 필요하면 언제든지 다시 접속해 주세요.</p>
        <div class="summary-box" id="savedSummary"></div>
        <button class="btn-reset" onclick="resetAll()">↺ 처음으로</button>
      </div>
    </div>
  </div>
</div>

<script>
const SHEET_URL = "https://script.google.com/macros/s/AKfycbwj0FJsJqo9NmEGifzDYXnSbiTIePGvqgJ506_XvHMGaV5blc4U0zaR-VOQs8GoFi_oNQ/exec";

const BRANDS = {
  "현대":["아반떼","쏘나타","그랜저","투싼","싼타페","팰리세이드","코나","아이오닉5","아이오닉6","스타리아","캐스퍼"],
  "기아":["K3","K5","K8","K9","셀토스","스포티지","쏘렌토","카니발","EV6","EV9","레이","모닝"],
  "제네시스":["G70","G80","G90","GV70","GV80","GV90","GV60"],
  "쌍용(KG모빌리티)":["티볼리","코란도","렉스턴","렉스턴스포츠","토레스","토레스EVX"],
  "르노코리아":["QM6","SM6","XM3","그랑콜레오스"],
  "한국GM(쉐보레)":["트레일블레이저","트랙스","스파크","말리부","이쿼녹스"],
  "BMW":["3시리즈","5시리즈","7시리즈","X3","X5","X7","iX","i4"],
  "벤츠":["C클래스","E클래스","S클래스","GLC","GLE","GLS","EQS"],
  "아우디":["A4","A6","A8","Q3","Q5","Q7","Q8","e-tron"],
  "폭스바겐":["골프","파사트","티구안","투아렉","ID.4"],
  "토요타/렉서스":["캠리","RAV4","하이랜더","프리우스","알파드","ES","NX","RX"],
  "기타":["기타차종"]
};
const COUNTRIES = {
  "아시아":["일본","중국","대만","홍콩","싱가포르","말레이시아","태국","인도네시아","필리핀","베트남","인도","미얀마","캄보디아","몽골"],
  "중동":["아랍에미리트","사우디아라비아","쿠웨이트","카타르","바레인","오만","요르단","이라크"],
  "유럽":["독일","영국","프랑스","이탈리아","스페인","폴란드","체코","헝가리","루마니아","러시아","우크라이나","네덜란드"],
  "아프리카":["나이지리아","케냐","남아프리카공화국","이집트","에티오피아","탄자니아","가나","모로코"],
  "북아메리카":["미국","캐나다","멕시코"],
  "남아메리카":["브라질","칠레","페루","콜롬비아","아르헨티나","에콰도르"],
  "오세아니아":["오스트레일리아","뉴질랜드"]
};

let cars=[],ctrs=[],user={};

function goPage(n){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById('page'+n).classList.add('active');
  [1,2,3].forEach(i=>{
    const el=document.getElementById('s'+i);
    el.classList.remove('done','cur');
    if(i<n) el.classList.add('done');
    else if(i===n) el.classList.add('cur');
  });
  if(n===4)[1,2,3].forEach(i=>document.getElementById('s'+i).classList.add('done'));
  window.scrollTo(0,0);
}

function st(id,msg,t){
  const el=document.getElementById(id);
  if(!msg){el.innerHTML='';return;}
  const icons={ok:'✓',err:'✕',ing:'...'};
  el.innerHTML=`<div class="sbar ${t}">${icons[t]} ${msg}</div>`;
}

function doAuth(){
  const n=document.getElementById('compName').value.trim();
  const b=document.getElementById('bizNo').value.trim();
  const p=document.getElementById('phone').value.trim();
  const c=document.getElementById('contactName').value.trim();
  if(!n||!b||!p||!c){st('authStatus','모든 항목을 입력해 주세요.','err');return;}
  if(b.replace(/-/g,'').length<10){st('authStatus','사업자등록번호를 정확히 입력해 주세요.','err');return;}
  user={name:n,biz:b,phone:p,contact:c};
  st('authStatus','인증되었습니다.','ok');
  setTimeout(()=>goPage(2),600);
}

const ys=document.getElementById('yearSel');
for(let y=2026;y>=2015;y--) ys.innerHTML+=`<option>${y}년식</option>`;
ys.innerHTML+='<option>2015년식 이전</option>';
const bs=document.getElementById('brandSel');
Object.keys(BRANDS).forEach(b=>bs.innerHTML+=`<option>${b}</option>`);

function loadModels(){
  const br=document.getElementById('brandSel').value;
  const ms=document.getElementById('modelSel');
  ms.innerHTML='<option value="">모델</option>';
  if(br&&BRANDS[br]) BRANDS[br].forEach(m=>ms.innerHTML+=`<option>${m}</option>`);
}
function loadCtrs(){
  const co=document.getElementById('contSel').value;
  const cs=document.getElementById('ctrSel');
  cs.innerHTML='<option value="">국가</option>';
  if(co&&COUNTRIES[co]) COUNTRIES[co].forEach(c=>cs.innerHTML+=`<option>${c}</option>`);
}

function addCar(){
  const br=document.getElementById('brandSel').value;
  const mo=document.getElementById('modelSel').value;
  const yr=document.getElementById('yearSel').value;
  if(!br||!mo||!yr){alert('제조사, 모델, 연식을 모두 선택해 주세요.');return;}
  const k=`${br} ${mo} ${yr}`;
  if(cars.includes(k)){alert('이미 추가된 차종입니다.');return;}
  cars.push(k);renderCars();
}
function renderCars(){
  const w=document.getElementById('carTags');
  w.innerHTML=cars.length?cars.map((c,i)=>`<span class="tag car-tag">${c}<button class="del" onclick="rmCar(${i})">×</button></span>`).join(''):'<span class="empty-msg">추가된 차종 없음</span>';
}
function rmCar(i){cars.splice(i,1);renderCars();}

function addCtr(){
  const c=document.getElementById('ctrSel').value;
  if(!c){alert('국가를 선택해 주세요.');return;}
  if(ctrs.includes(c)){alert('이미 추가된 국가입니다.');return;}
  ctrs.push(c);renderCtrs();
}
function renderCtrs(){
  const w=document.getElementById('ctrTags');
  w.innerHTML=ctrs.length?ctrs.map((c,i)=>`<span class="tag cty-tag">${c}<button class="del" onclick="rmCtr(${i})">×</button></span>`).join(''):'<span class="empty-msg">추가된 국가 없음</span>';
}
function rmCtr(i){ctrs.splice(i,1);renderCtrs();}

function goConfirm(){
  if(!cars.length){alert('관심 차종을 1개 이상 추가해 주세요.');return;}
  if(!ctrs.length){alert('수출 국가를 1개 이상 추가해 주세요.');return;}
  document.getElementById('c_name').textContent=user.name;
  document.getElementById('c_biz').textContent=user.biz;
  document.getElementById('c_contact').textContent=user.contact;
  document.getElementById('c_phone').textContent=user.phone;
  document.getElementById('c_cars').innerHTML=cars.map(c=>`<span class="chip">🚗 ${c}</span>`).join('');
  document.getElementById('c_ctrs').innerHTML=ctrs.map(c=>`<span class="chip">🌍 ${c}</span>`).join('');
  st('saveStatus','','');
  goPage(3);
}

async function doSave(){
  const btn=document.getElementById('saveBtn');
  btn.disabled=true;
  st('saveStatus','구글 시트에 저장 중...','ing');
  try{
    const params=new URLSearchParams();
    params.append('data', JSON.stringify({
      name:user.name, biz:user.biz, contact:user.contact,
      phone:user.phone, cars:cars, countries:ctrs
    }));
    await fetch(SHEET_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'application/x-www-form-urlencoded'},body:params.toString()});
    st('saveStatus','저장 완료!','ok');
    document.getElementById('savedSummary').innerHTML=
      `<p style="font-weight:600;margin-bottom:6px;color:#1A2340">${user.name}</p>`+
      `<p style="color:#6B7A99;margin-bottom:4px;font-size:13px">관심 차종 ${cars.length}개 · 수출 국가 ${ctrs.length}개 등록</p>`+
      `<p style="color:#A0AABB;font-size:12px">등록일시: ${new Date().toLocaleString('ko-KR')}</p>`;
    setTimeout(()=>goPage(4),800);
  }catch(e){
    st('saveStatus','저장 중 오류가 발생했습니다. 다시 시도해 주세요.','err');
    btn.disabled=false;
  }
}

function resetAll(){
  cars=[];ctrs=[];user={};
  ['compName','bizNo','phone','contactName'].forEach(id=>document.getElementById(id).value='');
  st('authStatus','','');
  renderCars();renderCtrs();
  goPage(1);
}
</script>
